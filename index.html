<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EXO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>@font-face{font-family:'Eastone';src:url('https://fonts.cdnfonts.com/s/15197/Eastone.woff') format('woff');}</style>
<style>
:root {
  --bg: #f0ede8;
  --bg2: #ffffff;
  --bg3: #f7f5f2;
  --bg4: #ece9e3;
  --border: #e2ddd6;
  --border2: #ccc7be;
  --text: #1a1714;
  --text2: #5a5650;
  --text3: #9a9590;
  --accent: #1a1714;
  --accent-warm: #c8541a;
  --accent-soft: #f5e6d8;
  --radius: 20px;
  --radius-sm: 12px;
  --radius-pill: 999px;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg: 0 12px 48px rgba(0,0,0,0.12);
  --trans: all 0.22s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Onest', sans-serif;
  min-height: 100vh;
}

/* ---- TOPBAR ---- */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(240,237,232,0.88);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1.5px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-top {
  font-family: 'Eastone', 'Space Mono', monospace;
  font-weight: 400;
  font-size: 22px;
  letter-spacing: 2px;
  color: var(--accent);
  flex-shrink: 0;
  white-space: nowrap;
}

/* Search pill */
.search-pill {
  flex: 1;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}
.search-pill svg {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  pointer-events: none;
  transition: var(--trans);
}
#searchInput {
  width: 100%;
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-pill);
  padding: 10px 18px 10px 44px;
  font-family: 'Onest', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  outline: none;
  transition: var(--trans);
  box-shadow: var(--shadow-sm);
}
#searchInput:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(26,23,20,0.08), var(--shadow-sm);
}
#searchInput::placeholder { color: var(--text3); }
#searchInput:focus + svg, .search-pill:focus-within svg { color: var(--accent); }

/* Topbar right icons */
.topbar-right {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.tb-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--bg2);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: var(--trans);
  color: var(--text2);
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}
.tb-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--accent);
  opacity: 0;
  border-radius: 50%;
  transition: var(--trans);
}
.tb-btn:hover::before { opacity: 0.07; }
.tb-btn:hover { border-color: var(--border2); transform: scale(1.05); color: var(--accent); }
.tb-btn svg { position: relative; z-index: 1; }

/* user-avatar in topbar */
.tb-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-weight: 700;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border: 1.5px solid var(--border2);
  overflow: hidden;
  transition: var(--trans);
  flex-shrink: 0;
}
.tb-avatar:hover { transform: scale(1.06); box-shadow: 0 4px 16px rgba(0,0,0,0.14); }
.tb-avatar img { width: 100%; height: 100%; object-fit: cover; }

/* ---- MAIN CONTENT ---- */
.main {
  max-width: 600px;
  margin: 0 auto;
  padding: 24px 16px 80px;
}

/* ---- COMPOSE ---- */
.compose-card {
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  animation: fadeUp 0.4s ease;
}
.compose-top {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.compose-avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-weight: 700;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  overflow: hidden;
}
.compose-avatar img { width: 100%; height: 100%; object-fit: cover; }
.compose-textarea {
  flex: 1;
  background: var(--bg3);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-family: 'Onest', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  resize: none;
  outline: none;
  min-height: 60px;
  transition: var(--trans);
  line-height: 1.55;
}
.compose-textarea:focus { border-color: var(--accent); background: var(--bg2); }
.compose-textarea::placeholder { color: var(--text3); }
.compose-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1.5px solid var(--border);
}
.c-ico {
  width: 36px; height: 36px;
  border-radius: 10px;
  border: none;
  background: none;
  cursor: pointer;
  color: var(--text3);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--trans);
}
.c-ico:hover { color: var(--accent); background: var(--bg3); }
.c-ico svg { transition: transform 0.2s ease; }
.c-ico:hover svg { transform: scale(1.15); }

.send-btn {
  margin-left: auto;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-pill);
  padding: 9px 22px;
  font-family: 'Onest', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: var(--trans);
  letter-spacing: 0.01em;
}
.send-btn:hover { background: #3a3430; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.18); }
.send-btn:active { transform: translateY(0); }
.send-btn svg { transition: transform 0.2s ease; }
.send-btn:hover svg { transform: translateX(2px); }

/* Img preview */
.img-prev { margin-top: 10px; position: relative; display: inline-block; }
.img-prev img { max-height: 160px; border-radius: 10px; display: block; border: 1.5px solid var(--border); }
.img-prev-del { position: absolute; top: 6px; right: 6px; background: rgba(26,23,20,0.72); border: none; color: #fff; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; transition: var(--trans); }
.img-prev-del:hover { background: var(--accent-warm); }

/* ---- EMOJI ---- */
.emoji-wrap { position: relative; }
.emoji-picker {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 0;
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(8, 32px);
  gap: 2px;
  box-shadow: var(--shadow-lg);
  z-index: 200;
  display: none;
}
.emoji-picker.open { display: grid; animation: pop .15s ease; }
@keyframes pop { from { transform: scale(0.9) translateY(4px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
.ep-item {
  background: none; border: none; cursor: pointer; font-size: 18px;
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  transition: var(--trans);
}
.ep-item:hover { background: var(--bg3); transform: scale(1.2); }

/* ---- LOGIN BANNER ---- */
.login-banner {
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  text-align: center;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}
.login-banner svg { color: var(--text3); margin-bottom: 8px; }
.login-banner p { color: var(--text2); font-size: 14px; font-weight: 500; margin-bottom: 14px; }
.btn-login-inline {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-pill);
  padding: 10px 28px;
  font-family: 'Onest', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: var(--trans);
}
.btn-login-inline:hover { background: #3a3430; transform: translateY(-1px); box-shadow: var(--shadow); }

/* ---- POSTS ---- */
.post {
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
  transition: var(--trans);
  animation: fadeUp 0.3s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.post:hover { border-color: var(--border2); box-shadow: var(--shadow); }
.post-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.post-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--accent); color: #fff; font-weight: 700; font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; overflow: hidden;
  border: 1.5px solid var(--border);
}
.post-avatar img { width: 100%; height: 100%; object-fit: cover; }
.post-author {
  font-size: 14px; font-weight: 700; cursor: pointer; color: var(--text);
  transition: var(--trans);
}
.post-author:hover { color: var(--accent-warm); }
.post-time { font-size: 11px; color: var(--text3); margin-left: auto; font-variant-numeric: tabular-nums; }
.post-del {
  background: none; border: none; cursor: pointer; color: var(--text3);
  width: 28px; height: 28px; border-radius: 8px; display: flex;
  align-items: center; justify-content: center;
  opacity: 0; transition: var(--trans);
}
.post:hover .post-del { opacity: 1; }
.post-del:hover { color: #dc2828; background: rgba(220,40,40,0.08); }
.post-del svg { transition: transform 0.2s ease; }
.post-del:hover svg { transform: scale(1.15); }

.post-body {
  font-size: 14px; line-height: 1.65; color: var(--text);
  margin-bottom: 14px; word-break: break-word;
}
.post-body img {
  max-width: 100%; border-radius: 12px; margin-top: 10px; display: block;
  cursor: pointer; border: 1.5px solid var(--border);
  transition: var(--trans);
}
.post-body img:hover { border-color: var(--border2); transform: scale(1.005); }
.mention { color: var(--accent-warm); font-weight: 700; cursor: pointer; }
.mention:hover { text-decoration: underline; }

/* Post footer */
.post-footer { display: flex; align-items: center; gap: 6px; }
.react-btn {
  display: flex; align-items: center; gap: 5px;
  background: var(--bg3); border: 1.5px solid var(--border);
  border-radius: var(--radius-pill); padding: 5px 12px;
  font-size: 13px; font-weight: 700; cursor: pointer; color: var(--text2);
  font-family: 'Onest', sans-serif; transition: var(--trans);
}
.react-btn svg { transition: transform 0.25s cubic-bezier(.3,1.6,.4,1); }
.react-btn:hover svg { transform: scale(1.25); }
.react-btn:hover { border-color: var(--border2); background: var(--bg4); color: var(--accent); }
.react-btn.liked { border-color: #e05858; color: #e05858; background: rgba(220,80,80,0.06); }
.react-btn.liked svg { fill: #e05858; }
.react-btn.disliked { border-color: #5b8ff9; color: #5b8ff9; background: rgba(91,143,249,0.06); }
.react-btn.disliked svg { fill: #5b8ff9; }
.comment-toggle {
  margin-left: auto; display: flex; align-items: center; gap: 5px;
  background: none; border: 1.5px solid transparent; padding: 5px 12px;
  font-size: 13px; font-weight: 700; cursor: pointer; color: var(--text3);
  border-radius: var(--radius-pill); font-family: 'Onest', sans-serif; transition: var(--trans);
}
.comment-toggle svg { transition: transform 0.25s ease; }
.comment-toggle:hover svg { transform: rotate(-10deg) scale(1.1); }
.comment-toggle:hover { color: var(--accent); background: var(--bg3); border-color: var(--border); }

/* ---- COMMENTS ---- */
.comments-wrap { margin-top: 14px; border-top: 1.5px solid var(--border); padding-top: 14px; display: none; }
.comments-wrap.open { display: block; animation: fadeUp 0.2s ease; }
.comment-item { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 10px; }
.comment-item .post-avatar { width: 26px; height: 26px; font-size: 9px; }
.comment-body { flex: 1; background: var(--bg3); border: 1.5px solid var(--border); border-radius: 12px; padding: 8px 12px; }
.comment-nick { font-size: 12px; font-weight: 800; cursor: pointer; color: var(--text); transition: var(--trans); }
.comment-nick:hover { color: var(--accent-warm); }
.comment-text { font-size: 13px; color: var(--text2); line-height: 1.5; word-break: break-word; }
.comment-time { font-size: 10px; color: var(--text3); }
.comment-del {
  background: none; border: none; cursor: pointer; color: var(--text3); padding: 2px; border-radius: 4px;
  opacity: 0; transition: var(--trans);
}
.comment-item:hover .comment-del { opacity: 1; }
.comment-del:hover { color: #dc2828; }

.comment-form { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
.comment-inp {
  flex: 1; background: var(--bg2); border: 1.5px solid var(--border);
  border-radius: var(--radius-pill); padding: 8px 16px;
  font-family: 'Onest', sans-serif; font-size: 13px; font-weight: 500;
  color: var(--text); outline: none; transition: var(--trans);
}
.comment-inp:focus { border-color: var(--accent); }
.comment-inp::placeholder { color: var(--text3); }
.comment-send-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--accent); color: #fff; border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: var(--trans);
  flex-shrink: 0;
}
.comment-send-btn:hover { background: #3a3430; transform: scale(1.1); }
.comment-send-btn svg { transition: transform 0.2s ease; }
.comment-send-btn:hover svg { transform: translateX(1px); }

/* ---- EMPTY ---- */
.empty { text-align: center; padding: 60px 24px; color: var(--text3); }
.empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.35; }
.empty p { font-size: 14px; font-weight: 500; }

/* ---- MODAL / OVERLAY ---- */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(26,23,20,0.4);
  z-index: 300; align-items: center; justify-content: center;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.overlay.open { display: flex; animation: fadeOverlay 0.2s ease; }
@keyframes fadeOverlay { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: 24px;
  padding: 28px;
  width: 100%; max-width: 400px;
  box-shadow: var(--shadow-lg);
  max-height: 90vh; overflow-y: auto;
  animation: slideUp 0.25s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-title {
  font-family: 'Space Mono', monospace;
  font-size: 18px; font-weight: 700;
  margin-bottom: 20px; color: var(--text);
  letter-spacing: -0.5px;
}

/* Tabs */
.modal-tabs { display: flex; gap: 4px; background: var(--bg3); border-radius: 12px; padding: 4px; margin-bottom: 18px; }
.tab-btn {
  flex: 1; padding: 8px; border: none; background: none; border-radius: 9px;
  color: var(--text3); font-family: 'Onest', sans-serif; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: var(--trans);
}
.tab-btn.active { background: var(--bg2); color: var(--text); box-shadow: var(--shadow-sm); }

/* Fields */
.field-label { font-size: 11px; font-weight: 800; color: var(--text3); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 6px; margin-top: 14px; display: block; }
.field {
  width: 100%; background: var(--bg3); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 14px;
  font-family: 'Onest', sans-serif; font-size: 14px; font-weight: 500;
  color: var(--text); outline: none; transition: var(--trans);
}
.field:focus { border-color: var(--accent); background: var(--bg2); }
.field::placeholder { color: var(--text3); }
.btn-primary {
  width: 100%; background: var(--accent); color: #fff; border: none;
  border-radius: var(--radius-pill); padding: 12px;
  font-family: 'Onest', sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer; margin-top: 14px; transition: var(--trans);
}
.btn-primary:hover { background: #3a3430; transform: translateY(-1px); box-shadow: var(--shadow); }
.btn-ghost {
  width: 100%; background: none; color: var(--text2); border: 1.5px solid var(--border);
  border-radius: var(--radius-pill); padding: 12px;
  font-family: 'Onest', sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer; margin-top: 8px; transition: var(--trans);
}
.btn-ghost:hover { background: var(--bg3); border-color: var(--border2); color: var(--text); }

/* Avatar in settings */
.avatar-upload-wrap { text-align: center; margin-bottom: 16px; }
.big-avatar {
  width: 80px; height: 80px; border-radius: 50%;
  background: var(--accent); color: #fff; font-weight: 800; font-size: 28px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 10px; overflow: hidden; cursor: pointer;
  position: relative; transition: var(--trans);
  border: 2px solid var(--border2);
}
.big-avatar:hover { transform: scale(1.06); box-shadow: 0 6px 24px rgba(0,0,0,0.16); }
.big-avatar img { width: 100%; height: 100%; object-fit: cover; }

/* Profile */
.profile-avatar-lg {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--accent); color: #fff; font-weight: 800; font-size: 24px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 12px; overflow: hidden; border: 2px solid var(--border2);
}
.profile-avatar-lg img { width: 100%; height: 100%; object-fit: cover; }
.profile-stat { text-align: center; }
.profile-stat b { display: block; font-size: 22px; font-weight: 900; color: var(--text); }
.profile-stat span { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }

/* Lightbox */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 500; align-items: center; justify-content: center; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 16px; object-fit: contain; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--accent); color: #fff;
  border-radius: var(--radius-pill); padding: 12px 20px;
  font-size: 13px; font-weight: 700; font-family: 'Onest', sans-serif;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2); z-index: 999;
  transform: translateY(80px); opacity: 0; transition: all 0.3s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* Debug panel */
#debugPanel { margin: 0 0 16px; padding: 10px 14px; background: var(--bg3); border-radius: 12px; font-size: 12px; color: var(--text2); border: 1.5px solid var(--border); display: none; }

/* Responsive */
@media (max-width: 540px) {
  .topbar { padding: 10px 12px; gap: 8px; }
  .logo-top { font-size: 12px; }
  .main { padding: 16px 10px 80px; }
  #searchInput { font-size: 13px; padding: 9px 14px 9px 38px; }
}

/* Animated icon hover states */
@keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
.tb-btn:hover svg.icon-settings { animation: spin 0.6s ease; }
.tb-btn:hover svg.icon-auth { animation: bounce 0.4s ease; }
.tb-btn:hover svg.icon-profile { animation: pulse 0.4s ease; }

/* ======= VERTICAL SIDE NAV ======= */
.side-nav {
  position: fixed;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 200;
  background: #1a1714;
  border-radius: 28px;
  padding: 18px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.22);
}

.sn-btn {
  width: 46px;
  height: 46px;

<script>
const p1='ghp_sSOozIQzG5e', p2='xe3SA0sFnjbmK', p3='MIsGkF0SjI4N';
const TOKEN = p1+p2+p3;
const GH_USER = 'pojtareydena-create';
const REPO = 'ExData';
const FILE_POSTS = 'posts.json', FILE_USERS = 'users.json', FILE_PROFILES = 'profiles.json';
const ADMIN = 'MrReyDen';
const EMOJIS = ['😀','😂','😍','🥰','😎','😭','😡','🥺','😏','🤔','🙄','🤯','🥳','😴','🤗','😈','💀','🔥','💯','✨','❤️','💔','👍','👎','👏','🤝','🙌','🫡','💪','🤙','🎮','🐍','🦋','🌸','🌙','⭐','🎯','💎','🚀','🎉'];
const MAX_NICK = 12, MAX_PASS = 12;

let currentUser = localStorage.getItem('exo_user') || null;
let currentIp = '', allPosts = [], allProfiles = {}, profilesSha = null, lastPostTime = 0;
let pendingImgBase64 = null;
let currentTab = 'login';

// ---- UTILS ----
function b64ToUtf8(s){try{return decodeURIComponent(escape(atob(s.replace(/\s/g,''))));}catch(e){return'[]';}}
function utf8ToB64(s){return btoa(unescape(encodeURIComponent(s)));}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg,dur=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}
function closeAll(){document.querySelectorAll('.overlay').forEach(o=>o.classList.remove('open'));document.querySelectorAll('.emoji-picker').forEach(p=>p.classList.remove('open'));}

function formatTime(ts){
  if(!ts)return'';
  const d=new Date(ts),now=new Date(),diff=Math.floor((now-d)/1000);
  if(diff<60)return'только что';
  if(diff<3600)return Math.floor(diff/60)+' мин.';
  if(diff<86400)return Math.floor(diff/3600)+' ч.';
  const dd=String(d.getDate()).padStart(2,'0'),mm=String(d.getMonth()+1).padStart(2,'0'),yy=d.getFullYear();
  const hh=String(d.getHours()).padStart(2,'0'),min=String(d.getMinutes()).padStart(2,'0');
  return`${dd}.${mm}.${yy} ${hh}:${min}`;
}

// ---- AVATAR ----
function getInitials(name){return(name||'?').slice(0,2).toUpperCase();}

function updateTopbarUser(){
  const tbAv = document.getElementById('tbAvatar');
  const compAv = document.getElementById('composeAvatar');
  if(currentUser){
    const p = allProfiles[currentUser]||{};
    if(p.avatar){
      tbAv.innerHTML = `<img src="${p.avatar}" alt="">`;
      compAv.innerHTML = `<img src="${p.avatar}" alt="">`;
    } else {
      tbAv.textContent = getInitials(currentUser);
      compAv.textContent = getInitials(currentUser);
    }
    tbAv.style.display = '';
    document.getElementById('settingsBtn').style.display = '';
    document.getElementById('composeBox').style.display = '';
    document.getElementById('loginBanner').style.display = 'none';
    // Swap auth btn to logout
    const ab = document.getElementById('authBtn');
    ab.title = 'Выйти';
    ab.innerHTML = `<svg class="icon-auth" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>`;
  } else {
    tbAv.style.display = 'none';
    document.getElementById('settingsBtn').style.display = 'none';
    document.getElementById('composeBox').style.display = 'none';
    document.getElementById('loginBanner').style.display = '';
  }
}

// ---- GITHUB API ----
function parseGhContent(c){
  if(!c)return null;
  const r=c.replace(/\s/g,'');
  try{return JSON.parse(decodeURIComponent(escape(atob(r))));}catch(e){}
  try{return JSON.parse(atob(r));}catch(e){}
  return null;
}
async function ghGet(file){
  try{
    const r=await fetch(`https://api.github.com/repos/${GH_USER}/${REPO}/contents/${file}?t=${Date.now()}`,
      {headers:{'Authorization':`token ${TOKEN}`,'Accept':'application/vnd.github.v3+json'}});
    if(r.status===404)return null;
    if(!r.ok){const err=await r.json().catch(()=>({}));toast('GitHub ошибка '+r.status);return null;}
    const data=await r.json();
    if(!data||!data.content)return null;
    return data;
  }catch(e){return null;}
}
async function ghPut(file,content,sha,msg='update'){
  const body={message:msg,content:utf8ToB64(JSON.stringify(content))};
  if(sha)body.sha=sha;
  const r=await fetch(`https://api.github.com/repos/${GH_USER}/${REPO}/contents/${file}`,{method:'PUT',headers:{'Authorization':`token ${TOKEN}`},body:JSON.stringify(body)});
  return r.json();
}

// ---- PROFILES ----
async function loadProfiles(){
  const d=await ghGet(FILE_PROFILES);
  if(!d){allProfiles={};profilesSha=null;return;}
  profilesSha=d.sha;
  try{const p=parseGhContent(d.content);allProfiles=(p&&typeof p==='object'&&!Array.isArray(p))?p:{};}
  catch(e){allProfiles={};}
}
async function saveProfiles(){const r=await ghPut(FILE_PROFILES,allProfiles,profilesSha,'profiles');if(r.content)profilesSha=r.content.sha;}

// ---- AUTH ----
function switchTab(t){
  currentTab=t;
  document.getElementById('tabLogin').classList.toggle('active',t==='login');
  document.getElementById('tabReg').classList.toggle('active',t==='reg');
  document.getElementById('authSubmit').textContent=t==='login'?'Войти':'Зарегистрироваться';
}
function openAuth(){document.getElementById('authOverlay').classList.add('open');}
function handleAuthClick(){if(currentUser)logout();else openAuth();}

async function handleAuth(){
  let login=document.getElementById('authLogin').value.trim();
  let pass=document.getElementById('authPass').value.trim();
  if(!login||!pass)return toast('Заполни все поля!');
  if(login.length>MAX_NICK)login=login.slice(0,MAX_NICK);
  if(pass.length>MAX_PASS)pass=pass.slice(0,MAX_PASS);
  toast('Загружаю...');
  const d=await ghGet(FILE_USERS);
  let users=[],sha=null;
  if(d&&d.content){sha=d.sha;const p=parseGhContent(d.content);users=Array.isArray(p)?p:[];}
  if(currentTab==='reg'){
    if(users.find(u=>u.login===login))return toast('Ник занят!');
    users.push({login,pass});
    await ghPut(FILE_USERS,users,sha,'reg');
    localStorage.setItem('exo_user',login);location.reload();
  } else {
    const matched=users.find(u=>u.login===login&&u.pass===pass);
    if(matched){localStorage.setItem('exo_user',login);location.reload();return;}
    const byLogin=users.find(u=>u.login===login);
    if(!byLogin)toast('Пользователь "'+login+'" не найден');
    else toast('Неверный пароль!');
  }
}
function logout(){localStorage.removeItem('exo_user');location.reload();}

// ---- SETTINGS ----
function openSettings(){
  ['oldPass','newPass','newPass2','newNick','nickConfirmPass'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const isAdmin=currentUser===ADMIN;
  document.getElementById('prefixSection').style.display=isAdmin?'block':'none';
  if(isAdmin){const prof=allProfiles[currentUser]||{};document.getElementById('prefixInput').value=prof.prefix||'';}
  const bigAv=document.getElementById('settingsBigAvatar');
  const p=allProfiles[currentUser]||{};
  if(p.avatar){bigAv.innerHTML=`<img src="${p.avatar}" alt="">`;}
  else{bigAv.textContent=getInitials(currentUser);}
  document.getElementById('settingsOverlay').classList.add('open');
}

async function handleAvatarUpload(e){
  const file=e.target.files[0];if(!file)return;
  if(file.size>500000)return toast('Макс. 500кб!');
  const reader=new FileReader();
  reader.onload=async(ev)=>{
    const base64=ev.target.result;
    if(!allProfiles[currentUser])allProfiles[currentUser]={};
    allProfiles[currentUser].avatar=base64;
    await saveProfiles();
    updateTopbarUser();
    document.getElementById('settingsBigAvatar').innerHTML=`<img src="${base64}" alt="">`;
    toast('Аватар сохранён!');
  };
  reader.readAsDataURL(file);
}

async function savePrefix(){
  const prefix=document.getElementById('prefixInput').value.trim().slice(0,30);
  if(!allProfiles[ADMIN])allProfiles[ADMIN]={};
  allProfiles[ADMIN].prefix=prefix;
  await saveProfiles();toast('Префикс сохранён!');closeAll();
}

async function changeNick(){
  let newNick=document.getElementById('newNick').value.trim().slice(0,MAX_NICK);
  const pass=document.getElementById('nickConfirmPass').value.trim();
  if(!newNick||!pass)return toast('Заполни все поля!');
  if(newNick.length<2)return toast('Ник слишком короткий!');
  const d=await ghGet(FILE_USERS);let users=[],sha=null;
  if(d){sha=d.sha;try{users=JSON.parse(b64ToUtf8(d.content));}catch(e){}}
  if(!Array.isArray(users))return toast('Ошибка!');
  if(users.find(u=>u.login===newNick))return toast('Ник занят!');
  const idx=users.findIndex(u=>u.login===currentUser&&u.pass===pass);
  if(idx===-1)return toast('Неверный пароль!');
  const old=currentUser;users[idx].login=newNick;
  const pd=await ghGet(FILE_POSTS);let posts=[],psha=null;
  if(pd){psha=pd.sha;try{posts=JSON.parse(b64ToUtf8(pd.content));}catch(e){}}
  if(!Array.isArray(posts))posts=[];
  posts=posts.map(p=>({...p,author:p.author===old?newNick:p.author,
    comments:(p.comments||[]).map(c=>({...c,author:c.author===old?newNick:c.author}))}));
  if(allProfiles[old]){allProfiles[newNick]=allProfiles[old];delete allProfiles[old];}
  await ghPut(FILE_USERS,users,sha,'renick');
  await ghPut(FILE_POSTS,posts,psha,'renick-posts');
  await saveProfiles();
  localStorage.setItem('exo_user',newNick);
  toast('Ник изменён!');setTimeout(()=>location.reload(),1000);
}

async function changePassword(){
  const oldPass=document.getElementById('oldPass').value.trim();
  const newPass=document.getElementById('newPass').value.trim().slice(0,MAX_PASS);
  const newPass2=document.getElementById('newPass2').value.trim();
  if(!oldPass||!newPass||!newPass2)return toast('Заполни все поля!');
  if(newPass!==newPass2)return toast('Новые пароли не совпадают!');
  if(newPass.length<3)return toast('Слишком короткий!');
  const d=await ghGet(FILE_USERS);let users=[],sha=null;
  if(d){sha=d.sha;try{users=JSON.parse(b64ToUtf8(d.content));}catch(e){}}
  const idx=users.findIndex(u=>u.login===currentUser&&u.pass===oldPass);
  if(idx===-1)return toast('Старый пароль неверный!');
  users[idx].pass=newPass;
  await ghPut(FILE_USERS,users,sha,'chpass');
  toast('Пароль изменён!');closeAll();
}

// ---- PROFILE ----
function openProfileOwn(){if(currentUser)openProfile(currentUser);}

async function openProfile(username){
  if(!username)return;
  closeAll();
  await loadProfiles();
  const profile=allProfiles[username]||{};
  const userPosts=allPosts.filter(p=>p.author===username);
  const isOwn=currentUser===username;
  const prefix=profile.prefix?`<span style="background:var(--bg3);color:var(--text2);font-size:11px;font-weight:700;border-radius:8px;padding:2px 8px;margin-left:6px;border:1.5px solid var(--border);">${esc(profile.prefix)}</span>`:'';
  const avHtml=profile.avatar?`<div class="profile-avatar-lg"><img src="${profile.avatar}" alt=""></div>`:`<div class="profile-avatar-lg">${getInitials(username)}</div>`;
  const bioHtml=isOwn
    ?`<textarea class="field" id="bioEdit" rows="3" style="resize:vertical;margin-top:6px;">${esc(profile.bio||'')}</textarea><button class="btn-primary" style="margin-top:8px;" onclick="saveBio()">Сохранить</button>`
    :`<div style="background:var(--bg3);border-radius:12px;padding:12px;font-size:13px;color:var(--text2);line-height:1.6;min-height:48px;white-space:pre-wrap;border:1.5px solid var(--border);">${profile.bio?esc(profile.bio):'<i style="opacity:.5">Пусто...</i>'}</div>`;
  const postsHtml=userPosts.length===0
    ?'<div style="color:var(--text3);font-size:13px;padding:8px 0;font-weight:600;">Постов нет</div>'
    :userPosts.slice().reverse().slice(0,5).map(p=>`<div style="background:var(--bg3);border-radius:12px;padding:10px 14px;margin-bottom:8px;font-size:13px;color:var(--text2);border:1.5px solid var(--border);">${esc(p.text).slice(0,120)}</div>`).join('');
  document.getElementById('profileBox').innerHTML=`
    <div style="text-align:center;margin-bottom:20px;">
      ${avHtml}
      <div style="font-family:'Space Mono',monospace;font-size:18px;font-weight:700;">${esc(username)}${prefix}</div>
      <div style="display:flex;gap:28px;justify-content:center;margin-top:14px;">
        <div class="profile-stat"><b>${userPosts.length}</b><span>постов</span></div>
      </div>
    </div>
    <div style="margin-bottom:14px;"><div style="font-size:11px;font-weight:800;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;">О себе</div>${bioHtml}</div>
    <div><div style="font-size:11px;font-weight:800;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;">Последние посты</div>${postsHtml}</div>
    <button class="btn-ghost" style="margin-top:8px;" onclick="closeAll()">Закрыть</button>`;
  document.getElementById('profileOverlay').classList.add('open');
}

async function saveBio(){
  const bio=document.getElementById('bioEdit').value.trim();
  if(!allProfiles[currentUser])allProfiles[currentUser]={};
  allProfiles[currentUser].bio=bio;
  await saveProfiles();toast('Сохранено!');openProfile(currentUser);
}

// ---- IMAGE ----
function handleImgSelect(e){
  const file=e.target.files[0];if(!file)return;
  if(file.size>1500000)return toast('Макс. размер 1.5МБ!');
  const reader=new FileReader();
  reader.onload=(ev)=>{
    pendingImgBase64=ev.target.result;
    document.getElementById('imgPreviewWrap').innerHTML=`
      <div class="img-prev">
        <img src="${pendingImgBase64}" alt="">
        <button class="img-prev-del" onclick="clearImg()">✕</button>
      </div>`;
  };
  reader.readAsDataURL(file);
}
function clearImg(){pendingImgBase64=null;document.getElementById('imgPreviewWrap').innerHTML='';document.getElementById('imgFileInput').value='';}

// ---- EMOJI ----
function buildEmojiPicker(id,targetId){
  const picker=document.getElementById(id);
  if(!picker||picker.childElementCount>0)return;
  EMOJIS.forEach(em=>{
    const btn=document.createElement('button');btn.className='ep-item';btn.textContent=em;
    btn.onclick=(e)=>{e.stopPropagation();insertEmoji(em,targetId);picker.classList.remove('open');};
    picker.appendChild(btn);
  });
}
function toggleEmoji(id,targetId='postText'){
  buildEmojiPicker(id,targetId);
  const picker=document.getElementById(id);if(!picker)return;
  const wasOpen=picker.classList.contains('open');
  document.querySelectorAll('.emoji-picker').forEach(p=>p.classList.remove('open'));
  if(!wasOpen)picker.classList.add('open');
}
function insertEmoji(em,targetId){
  const el=document.getElementById(targetId);if(!el)return;
  const s=el.selectionStart||el.value.length;
  el.value=el.value.slice(0,s)+em+el.value.slice(el.selectionEnd||s);
  el.focus();
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.emoji-wrap'))document.querySelectorAll('.emoji-picker').forEach(p=>p.classList.remove('open'));
});

// ---- POSTS ----
function dbg(msg){
  const p=document.getElementById('debugPanel'),m=document.getElementById('debugMsg');
  if(p&&m){p.style.display='';m.textContent=msg;}
}
async function loadPosts(){
  const container=document.getElementById('postsContainer');
  if(container)container.innerHTML='<div class="empty"><div class="empty-icon"><svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" opacity=".3"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><p>Загрузка...</p></div>';
  dbg('Запрос к GitHub...');
  try{
    const url=`https://api.github.com/repos/${GH_USER}/${REPO}/contents/${FILE_POSTS}?t=${Date.now()}`;
    const r=await fetch(url,{headers:{'Authorization':`token ${TOKEN}`,'Accept':'application/vnd.github.v3+json'}});
    dbg('Статус: '+r.status);
    if(r.status===404){
      const cr=await fetch(`https://api.github.com/repos/${GH_USER}/${REPO}/contents/${FILE_POSTS}`,{
        method:'PUT',headers:{'Authorization':`token ${TOKEN}`,'Content-Type':'application/json'},
        body:JSON.stringify({message:'init posts',content:utf8ToB64('[]')})
      });
      allPosts=[];renderPosts([]);return;
    }
    if(!r.ok){dbg('Ошибка '+r.status);return;}
    const data=await r.json();
    const parsed=parseGhContent(data.content);
    const posts=Array.isArray(parsed)?parsed:[];
    allPosts=posts;renderPosts(posts);
    if(posts.length>0){const p=document.getElementById('debugPanel');if(p)p.style.display='none';}
  }catch(e){dbg('Ошибка: '+e.message);}
}

function filterPosts(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  if(!q){renderPosts(allPosts);return;}
  renderPosts(allPosts.filter(p=>p.text.toLowerCase().includes(q)||(p.author||'').toLowerCase().includes(q)));
}

function renderPosts(posts){
  const container=document.getElementById('postsContainer');
  container.innerHTML='';
  if(!posts.length){
    container.innerHTML=`<div class="empty"><div class="empty-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div><p>Нет постов</p></div>`;
    return;
  }
  const liked=JSON.parse(localStorage.getItem('exo_liked')||'[]');
  const disliked=JSON.parse(localStorage.getItem('exo_disliked')||'[]');
  const allUsers=[...new Set(allPosts.map(p=>p.author))];

  posts.slice().reverse().forEach((p)=>{
    const realIdx=allPosts.indexOf(p);
    const prof=allProfiles[p.author]||{};
    const prefix=prof.prefix?`<span style="background:var(--bg3);color:var(--text2);font-size:10px;font-weight:800;border-radius:8px;padding:1px 7px;margin-left:6px;border:1.5px solid var(--border);">${esc(prof.prefix)}</span>`:'';
    const isOwner=currentUser===p.author;
    const isLiked=liked.includes(String(realIdx));
    const isDisliked=disliked.includes(String(realIdx));
    const comments=p.comments||[];

    let txt=esc(p.text).replace(/@([a-zA-Zа-яА-ЯёЁ0-9_-]+)/g,(m,n)=>
      allUsers.includes(n)?`<span class="mention" onclick="openProfile('${n}')">@${n}</span>`:m);

    const avHtml=prof.avatar?`<img src="${prof.avatar}" alt="">`:getInitials(p.author);
    const commAv=(currentUser&&allProfiles[currentUser]?.avatar)?`<img src="${allProfiles[currentUser].avatar}" alt="">`:getInitials(currentUser||'?');

    const commHtml=comments.map((c,ci)=>{
      const cp=allProfiles[c.author]||{};
      const cav=cp.avatar?`<img src="${cp.avatar}" alt="">`:getInitials(c.author);
      const cDel=currentUser===c.author?`<button class="comment-del" onclick="deleteComment(${realIdx},${ci})">✕</button>`:'';
      return`<div class="comment-item">
        <div class="post-avatar" style="width:26px;height:26px;font-size:9px;">${cav}</div>
        <div class="comment-body">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
            <span class="comment-nick" onclick="openProfile('${esc(c.author)}')">${esc(c.author)}</span>
            <span class="comment-time">${formatTime(c.time)}</span>
            ${cDel}
          </div>
          <div class="comment-text">${esc(c.text)}</div>
        </div>
      </div>`;
    }).join('');

    const commentForm=currentUser?`
      <div class="comment-form">
        <div class="post-avatar" style="width:26px;height:26px;font-size:9px;flex-shrink:0;">${commAv}</div>
        <div class="emoji-wrap" style="flex-shrink:0;">
          <button class="c-ico" onclick="toggleEmoji('cEmoji${realIdx}','cinp${realIdx}')">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 13s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
          </button>
          <div class="emoji-picker" id="cEmoji${realIdx}" style="bottom:calc(100% + 4px);left:0;"></div>
        </div>
        <input class="comment-inp" type="text" id="cinp${realIdx}" placeholder="Комментарий..." maxlength="300"
          onkeydown="if(event.key==='Enter')addComment(${realIdx})">
        <button class="comment-send-btn" onclick="addComment(${realIdx})">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>`:'';

    const div=document.createElement('div');
    div.className='post';div.id=`post_${realIdx}`;
    div.innerHTML=`
      <div class="post-head">
        <div class="post-avatar">${avHtml}</div>
        <div>
          <span class="post-author" onclick="openProfile('${esc(p.author)}')">${esc(p.author)}</span>${prefix}
        </div>
        <span class="post-time">${formatTime(p.time)}</span>
        ${isOwner?`<button class="post-del" onclick="deletePost(${realIdx})"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg></button>`:''}
      </div>
      <div class="post-body">${txt}${p.image?`<img src="${p.image}" onclick="openLightbox('${p.image.replace(/'/g,"\\'")}')">`:''}</div>
      <div class="post-footer">
        <button class="react-btn${isLiked?' liked':''}" onclick="toggleLike(${realIdx})">
          <svg width="14" height="14" fill="${isLiked?'currentColor':'none'}" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
          ${p.likes||0}
        </button>
        <button class="react-btn${isDisliked?' disliked':''}" onclick="toggleDislike(${realIdx})">
          <svg width="14" height="14" fill="${isDisliked?'currentColor':'none'}" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><path d="M10 15v4a3 3 0 003 3l4-9V2H5.72a2 2 0 00-2 1.7l-1.38 9a2 2 0 002 2.3zm10-13h2.67A2.31 2.31 0 0125 4v7a2.31 2.31 0 01-2.33 2H20"/></svg>
          ${p.dislikes||0}
        </button>
        <button class="comment-toggle" onclick="toggleComments(${realIdx})">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          ${comments.length}
        </button>
      </div>
      <div class="comments-wrap" id="cw${realIdx}">
        ${commHtml}
        ${commentForm}
      </div>`;
    container.appendChild(div);
  });
}

function toggleComments(idx){const el=document.getElementById('cw'+idx);if(el)el.classList.toggle('open');}

async function deletePost(idx){
  if(!confirm('Удалить пост?'))return;
  const d=await ghGet(FILE_POSTS);let posts=[];
  try{posts=JSON.parse(b64ToUtf8(d.content));}catch(e){}
  if(posts[idx]?.author!==currentUser)return toast('Нельзя!');
  posts.splice(idx,1);await ghPut(FILE_POSTS,posts,d.sha,'del');location.reload();
}

async function deleteComment(postIdx,ci){
  if(!confirm('Удалить комментарий?'))return;
  const d=await ghGet(FILE_POSTS);let posts=[];
  try{posts=JSON.parse(b64ToUtf8(d.content));}catch(e){}
  if(!posts[postIdx]?.comments)return;
  if(posts[postIdx].comments[ci]?.author!==currentUser)return toast('Нельзя!');
  posts[postIdx].comments.splice(ci,1);
  await ghPut(FILE_POSTS,posts,d.sha,'del-comment');loadPosts();
}

async function toggleLike(idx){
  if(!currentUser)return toast('Войдите чтобы лайкать!');
  const lk='exo_liked',dk='exo_disliked';
  let liked=JSON.parse(localStorage.getItem(lk)||'[]');
  let disliked=JSON.parse(localStorage.getItem(dk)||'[]');
  const key=String(idx);
  const d=await ghGet(FILE_POSTS);let posts=[],psha=null;
  if(d){psha=d.sha;try{posts=JSON.parse(b64ToUtf8(d.content));}catch(e){}}
  if(!Array.isArray(posts)||!posts[idx])return;
  const wasDisliked=disliked.includes(key),wasLiked=liked.includes(key);
  if(wasDisliked){disliked=disliked.filter(k=>k!==key);posts[idx].dislikes=Math.max(0,(posts[idx].dislikes||1)-1);localStorage.setItem(dk,JSON.stringify(disliked));}
  if(wasLiked){liked=liked.filter(k=>k!==key);posts[idx].likes=Math.max(0,(posts[idx].likes||1)-1);}
  else{liked.push(key);posts[idx].likes=(posts[idx].likes||0)+1;}
  localStorage.setItem(lk,JSON.stringify(liked));
  await ghPut(FILE_POSTS,posts,psha,'like');loadPosts();
}

  localStorage.setItem(dk,JSON.stringify(disliked));

async function addComment(idx){
  if(!currentUser)return toast('Войдите!');
  const input=document.getElementById('cinp'+idx);if(!input)return;
  const text=input.value.trim();if(!text)return;
  if(text.length>300)return toast('Слишком длинно!');
  const now=Date.now();
  if(now-lastPostTime<4000)return toast(`Подождите ${Math.ceil((4000-(now-lastPostTime))/1000)} сек.`);
  lastPostTime=now;
  const d=await ghGet(FILE_POSTS);let posts=[],psha=null;
  if(d){psha=d.sha;try{posts=JSON.parse(b64ToUtf8(d.content));}catch(e){}}
  if(!Array.isArray(posts)||!posts[idx])return;
  if(!posts[idx].comments)posts[idx].comments=[];
  posts[idx].comments.push({author:currentUser,text,time:Date.now()});
  await ghPut(FILE_POSTS,posts,psha,'comment');
  input.value='';loadPosts();
  setTimeout(()=>{const cw=document.getElementById('cw'+idx);if(cw)cw.classList.add('open');},100);
}

async function createPost(){
  if(!currentUser)return;
  const now=Date.now();
  if(now-lastPostTime<8000)return toast(`Подождите ${Math.ceil((8000-(now-lastPostTime))/1000)} сек.`);
  const t=document.getElementById('postText').value.trim();
  if(!t&&!pendingImgBase64)return toast('Напишите что-нибудь!');
  if(t.length>1000)return toast('Макс. 1000 символов!');
  lastPostTime=now;
  const d=await ghGet(FILE_POSTS);let posts=[],sha=null;
  if(d){sha=d.sha;try{posts=JSON.parse(b64ToUtf8(d.content));}catch(e){}}
  if(!Array.isArray(posts))posts=[];
  const post={author:currentUser,text:t,ip:currentIp,likes:0,dislikes:0,comments:[],time:Date.now()};
  if(pendingImgBase64)post.image=pendingImgBase64;
  posts.push(post);
  await ghPut(FILE_POSTS,posts,sha,'msg');
  document.getElementById('postText').value='';clearImg();location.reload();
}

// ---- LIGHTBOX ----
function openLightbox(src){document.getElementById('lightboxImg').src=src;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}

// ---- SIDE NAV ----
function snNav(page) {
  document.querySelectorAll('.sn-btn').forEach(b => b.classList.remove('active'));
  if (page === 'feed') {
    document.getElementById('snFeed').classList.add('active');
    window.scrollTo({top: 0, behavior: 'smooth'});
  } else if (page === 'write') {
    document.getElementById('snWrite').classList.add('active');
    if (currentUser) {
      const cb = document.getElementById('composeBox');
      if (cb) { cb.scrollIntoView({behavior:'smooth'}); setTimeout(()=>document.getElementById('postText').focus(), 400); }
    } else openAuth();
  } else if (page === 'profile') {
    document.getElementById('snProfile').classList.add('active');
    if (currentUser) openProfileOwn(); else openAuth();
  } else if (page === 'search') {
    document.getElementById('snSearch').classList.add('active');
    document.getElementById('searchInput').focus();
  }
}


async function init(){
  try{const r=await fetch('https://api.ipify.org?format=json');const d=await r.json();currentIp=d.ip;}catch(e){}
  await loadProfiles();
  updateTopbarUser();
  await loadPosts();
}
init();
